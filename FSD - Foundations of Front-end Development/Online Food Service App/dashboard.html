
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Bites - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>    
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow flex flex-col md:flex-row items-center justify-between px-8 py-4 mb-8">
       
        <div class="flex items-center space-x-4">
            <h1 class="text-3xl font-bold text-orange-600">Quick Bites Food Delivery</h1>
            <h1 class =text-3xl font-bold text-black>$0 DELIVERY FEES!!</h1>
            <h1 class="mr-1 text-2xl font-bold text-orange-600">Hello!</h1>
            <span id="userEmail" class="ml-1 text-2xl font-bold text-orange-600"></span>
            <span id="cartCount" class="ml-2 bg-yellow-300 text-black px-2 py-1 rounded"></span>
    </div>
       
        <div class="mt-4 md:mt-0 flex space-x-2">
            <input type="button" value="Menu" onclick="showFoodSelection()"
                   class="bg-orange-500 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>
            <input type="button" value="&#128722;" onclick="showCartSelection()"
                   class="bg-yellow-300 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>
            <input type="button" value="Logout" onclick="logout()"
                   class="bg-transparent hover:bg-red-600 text-black font-bold py-2 px-4 rounded cursor-pointer"/>
    </div>
    </nav>
    <main class="container mx-auto px-4">
        <!-- <h3 class="text-xl font-semibold mb-4">Menu Items</h3> -->
        <section id="foodSelection" class="grid grid-cols-1 md:grid-cols-3 gap-6 p-20 bg-white rounded shadow mb-8">
            <!-- Food items will be rendered here -->
        </section>
        <section id="cartSelection" class="bg-white rounded shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Items In Cart</h2>
            <div id="cartItem">
            <!-- Cart items will be rendered here -->
            </div>      
            <div class="mt-4 md:mt-0 flex space-x-2"> 
             <input type="button" value="Checkout" onclick="checkOut()"
                   class="bg-orange-500 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded cursor-pointer"/>
            </div>
        </section>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>

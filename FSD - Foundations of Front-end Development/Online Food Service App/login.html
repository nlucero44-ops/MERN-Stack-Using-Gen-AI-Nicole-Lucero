<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Bites - Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-400 flex items-center justify-center min-h-screen p-4">

    <div class="flex flex-col md:flex-row bg-white rounded-lg shadow-2xl overflow-hidden max-w-4xl w-full">
        
        <!-- Left Side: Image  -->
        <div class="hidden md:block md:w-1/2">
            <img src="https://media.istockphoto.com/id/1829241109/photo/enjoying-a-brunch-together.jpg?s=612x612&w=0&k=20&c=9awLLRMBLeiYsrXrkgzkoscVU_3RoVwl_HA-OT-srjQ=" 
                 alt="Login Illustration" 
                 class="h-full w-full object-cover">
        </div>

        <!-- Right Side: Form -->
        <div class="w-full md:w-1/2 p-8">
            <h1 class="text-3xl font-bold text-center text-orange-600 mb-2">Welcome to Quick Bites</h1>
            <p class="text-center text-black mb-6">Ready for something delicious?</p>

            <form action="dashboard.html" onsubmit="return checkInfo()" method="get">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="emailId">Email</label>
                <input type="email" id="emailId" placeholder="Enter your email" required 
                       class="mb-4 px-3 py-2 border rounded w-full focus:outline-none focus:ring-2 focus:ring-orange-400"/>

                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required 
                       class="mb-6 px-3 py-2 border rounded w-full focus:outline-none focus:ring-2 focus:ring-orange-400"/>

                <div class="flex items-center justify-between gap-4">
                    <button type="submit" id="loginBtn" 
                            class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded transition-colors w-full">
                        Login
                    </button>
                    <button type="reset" 
                            class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-6 rounded transition-colors">
                        Reset
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
